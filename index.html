<!DOCTYPE html>
<!--
  ============================================================
   משחק: כוכבים נופלים  ⭐
   נבנה עבור עומר כדי ללמוד לתכנת עם Claude Code
  ============================================================

  איך משחקים?
  - מזיזים את הסלסלה ימינה ושמאלה עם החיצים במקלדת (או עם העכבר / האצבע בנייד).
  - תופסים כוכבים שנופלים מלמעלה — כל כוכב = נקודה.
  - אם כוכב נופל לרצפה — מאבדים "חיים". יש 3 חיים.

  --- אזור ההגדרות למטה (ALL CAPS) זה המקום הכי כיף לשחק איתו ---
  שנו את המספרים, שמרו, ורעננו את הדף בדפדפן כדי לראות מה קרה.
-->
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>כוכבים נופלים ⭐</title>
  <style>
    /* ====== עיצוב המסך ====== */
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(#0b1026, #1b2a6b);
      color: white;
      text-align: center;
      overflow: hidden;
      user-select: none;
    }
    h1 { margin: 10px 0 4px; font-size: 24px; }
    #lhuh { font-size: 14px; opacity: .8; margin: 0 0 8px; }
    #scoreboard {
      font-size: 20px;
      margin: 6px;
    }
    canvas {
      background: linear-gradient(#0b1026, #243b8f);
      border: 3px solid #42bbc8;
      border-radius: 12px;
      display: block;
      margin: 0 auto;
      max-width: 96vw;
      touch-action: none;
    }
    #startScreen {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,.8);
      padding: 26px 36px;
      border-radius: 16px;
      font-size: 22px;
      border: 2px solid #42bbc8;
    }
    #screenMessage { font-size: 20px; margin-bottom: 8px; color: #fbbc46; }
    #screenTitle  { font-size: 24px; margin-bottom: 16px; font-weight: bold; }
    .diffBtn {
      display: block;
      width: 200px;
      margin: 10px auto;
      padding: 12px 22px;
      font-size: 20px;
      border: none;
      border-radius: 10px;
      background: #fbbc46;
      color: #282355;
      font-weight: bold;
      cursor: pointer;
    }
    .diffBtn:hover { background: #ffd277; }
    .nameRow { margin: 12px 0 4px; font-size: 16px; }
    .nameRow input {
      margin-inline-start: 6px;
      padding: 6px 10px;
      border-radius: 8px;
      border: 1px solid #42bbc8;
      font-size: 16px;
      width: 140px;
      text-align: center;
      background: #0b1026;
      color: white;
    }
    .nameRow input.invalid { border-color: #ff5e5e; }
    .nameError { color: #ff5e5e; font-size: 14px; min-height: 18px; margin-top: 4px; }
    #leaderboardBox { margin-top: 14px; font-size: 16px; }
    .lbTitle { font-weight: bold; margin-bottom: 6px; color: #fbbc46; }
    .lbRow { margin: 2px 0; }
  </style>
</head>
<body>

  <h1>⭐ כוכבים נופלים ⭐</h1>
  <p id="lhuh">הזיזו את הסלסלה עם החיצים ← → ותפסו כוכבים!</p>
  <div id="scoreboard">רמה: <span id="level">קל 🟢</span> &nbsp;|&nbsp; ניקוד: <span id="score">0</span> / <span id="target">20</span> &nbsp;|&nbsp; חיים: <span id="lives">❤️❤️❤️❤️❤️</span> &nbsp;|&nbsp; סה"כ: <span id="totalScoreDisplay">0</span> &nbsp;|&nbsp; 🏆 שיא: <span id="highScore">0</span></div>

  <canvas id="game" width="600" height="500"></canvas>

  <div id="startScreen">
    <div id="screenMessage"></div>
    <div id="screenButtons"></div>
  </div>

  <script>
  // =========================================================
  //  אזור ההגדרות — כאן הכי כיף לשנות! ⚙️
  //  (נסו לשנות מספר, לשמור, ולרענן את הדף)
  // =========================================================
  // לכל רמת קושי יש מספרים משלה. שנו אותם, שמרו, ובחרו את הרמה במסך הפתיחה.
  const DIFFICULTIES = {
    easy: {                 // קל 🟢
      name: "קל 🟢",
      target: 20,           // כמה כוכבים צריך לאסוף כדי לעבור לרמה הבאה
      next: "medium",       // הרמה הבאה אחרי שמסיימים
      lives: 5,             // כמה לבבות מתחילים איתם
      basketWidth: 120,     // רוחב הסלסלה (גדול = קל יותר לתפוס)
      starSpeed: 2,         // מהירות נפילת הכוכבים
      starRate: 70,         // כל כמה זמן נופל כוכב (מספר קטן = יותר כוכבים)
      mineSpeed: 2.5,       // מהירות נפילת המוקשים
      mineRate: 260,        // כל כמה זמן נופל מוקש (מספר גדול = פחות מוקשים)
    },
    medium: {               // בינוני 🟡
      name: "בינוני 🟡",
      target: 15,
      next: "hard",
      lives: 4,
      basketWidth: 90,
      starSpeed: 3,
      starRate: 60,
      mineSpeed: 3.5,
      mineRate: 150,
    },
    hard: {                 // קשה 🔴
      name: "קשה 🔴",
      target: Infinity,     // אין יעד — הרמה אינסופית! ממשיכים עד שנגמרים הלבבות
      next: null,           // אין רמה הבאה — משחקים "קשה" עד הסוף
      lives: 3,
      basketWidth: 65,
      starSpeed: 4.5,
      starRate: 45,
      mineSpeed: 5,
      mineRate: 90,
    },
  };

  // הגדרות שלא משתנות בין הרמות:
  const BASKET_SPEED = 7;    // מהירות תזוזת הסלסלה
  const STAR_SIZE    = 22;   // גודל הכוכב
  const MINE_SIZE    = 18;   // גודל המוקש

  // אלה ימולאו לפי הרמה שנבחרת (מתחילים עם ערכי "בינוני" כברירת מחדל)
  let STARTING_LIVES  = DIFFICULTIES.medium.lives;
  let BASKET_WIDTH    = DIFFICULTIES.medium.basketWidth;
  let STAR_FALL_SPEED = DIFFICULTIES.medium.starSpeed;
  let STAR_SPAWN_RATE = DIFFICULTIES.medium.starRate;
  let MINE_FALL_SPEED = DIFFICULTIES.medium.mineSpeed;
  let MINE_SPAWN_RATE = DIFFICULTIES.medium.mineRate;

  // =========================================================
  //  מכאן והלאה זה ה"מנוע" של המשחק.
  //  אפשר להציץ, ובהמשך גם לשנות — אבל לא חובה כדי לשחק.
  // =========================================================

  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const scoreEl = document.getElementById("score");
  const targetEl = document.getElementById("target");
  const levelEl = document.getElementById("level");
  const livesEl = document.getElementById("lives");
  const highScoreEl = document.getElementById("highScore");
  const totalScoreEl = document.getElementById("totalScoreDisplay");
  const startScreen = document.getElementById("startScreen");
  const screenMessage = document.getElementById("screenMessage");
  const screenButtons = document.getElementById("screenButtons");

  let basketX, score, lives, stars, mines, particles, frameCount, isPlaying;
  let currentLevel = "easy";   // הרמה שבה משחקים כרגע (תמיד מתחילים מ"קל")
  let playerName = "שחקן אלמוני";   // שם השחקן הנוכחי
  let totalScore = 0;               // סך כל הכוכבים שנאספו בריצה הנוכחית (לכל השלבים ביחד)
  let moveLeft = false, moveRight = false;

  // איפוס טבלת השיאים לכל השחקנים — עולה פעם אחת עם כל גרסה חדשה של המשחק.
  // מי שכבר שיחק בגרסה ישנה יתחיל מחדש מ-0 ברגע שהוא פותח את הגרסה הזו.
  const SAVE_VERSION = "2";
  if (localStorage.getItem("starsSaveVersion") !== SAVE_VERSION) {
    localStorage.removeItem("starsLeaderboard");
    localStorage.removeItem("starsHighScore");
    localStorage.setItem("starsSaveVersion", SAVE_VERSION);
  }

  // טוענים את השיא מהזיכרון של הדפדפן (אם אין עדיין — מתחילים מ-0).
  // localStorage שומר את המספר גם אחרי שסוגרים את הדף או מכבים את המחשב.
  let highScore = Number(localStorage.getItem("starsHighScore")) || 0;

  // =========================================================
  //  רקעי חלל 🌌 — תמונות אמיתיות של נאס"א (NASA), מוצגות מעל שמיים+כוכבים מצוירים
  //  אינדקסים 0-1 = קל/בינוני, אינדקסים 2-5 = מתחלפים ברמת קשה
  // =========================================================
  const SPACE_THEMES = [
    { // 0: ערפילית הטרנטולה — רמת קל (תמונה שממלאת את כל הרקע)
      mode: "field", file: "space/0_nebula.jpg", img: new Image(),
    },
    { // 1: צדק (יופיטר) עם הכתם האדום הגדול — רמת בינוני
      mode: "circle", skyTop: "#1b1710", skyBottom: "#050402",
      x: 430, y: 150, r: 95, file: "space/1_jupiter.jpg", img: new Image(),
    },
    { // 2: אורנוס — רמת קשה (מתחלף 1)
      mode: "circle", skyTop: "#03181c", skyBottom: "#01080a",
      x: 150, y: 150, r: 90, file: "space/2_uranus.jpg", img: new Image(),
    },
    { // 3: כדור הארץ — רמת קשה (מתחלף 2)
      mode: "circle", skyTop: "#040a1c", skyBottom: "#01030a",
      x: 440, y: 170, r: 100, file: "space/3_earth.jpg", img: new Image(),
    },
    { // 4: שבתאי עם הטבעות — רמת קשה (מתחלף 3). מלבני כדי לא לקטוע את הטבעות
      mode: "rect", skyTop: "#171006", skyBottom: "#060402",
      x: 300, y: 190, r: 110, file: "space/4_saturn.jpg", img: new Image(),
    },
    { // 5: מאדים האדום — רמת קשה (מתחלף 4)
      mode: "circle", skyTop: "#1a0805", skyBottom: "#070301",
      x: 160, y: 160, r: 95, file: "space/5_mars.jpg", img: new Image(),
    },
  ];
  SPACE_THEMES.forEach((t) => { t.img.src = t.file; });   // מתחילים לטעון את כל התמונות כבר עכשיו

  // --- "מכסה" תמונה על תוך מלבן יעד, בלי לעוות אותה (כמו CSS background-size: cover) ---
  function drawImageCover(bctx, img, dx, dy, dw, dh) {
    const destRatio = dw / dh;
    const srcRatio = img.width / img.height;
    let sx, sy, sw, sh;
    if (srcRatio > destRatio) {
      sh = img.height;
      sw = sh * destRatio;
      sx = (img.width - sw) / 2;
      sy = 0;
    } else {
      sw = img.width;
      sh = sw / destRatio;
      sx = 0;
      sy = (img.height - sh) / 2;
    }
    bctx.drawImage(img, sx, sy, sw, sh, dx, dy, dw, dh);
  }

  // --- מצייר ערכת נושא חלל אחת על "קנבס נסתר" (נעשה פעם אחת בלבד ונשמר) ---
  function generateSpaceBackground(theme) {
    const bg = document.createElement("canvas");
    bg.width = canvas.width;
    bg.height = canvas.height;
    const bctx = bg.getContext("2d");

    // עבור תמונות "כוכב לכת" מציירים קודם שמיים כהים + כוכבים מפוזרים ברקע.
    // תמונת הערפילית (mode: field) כבר מלאה בכוכבים בעצמה — לא צריך תוספת.
    if (theme.mode !== "field") {
      const sky = bctx.createLinearGradient(0, 0, 0, bg.height);
      sky.addColorStop(0, theme.skyTop);
      sky.addColorStop(1, theme.skyBottom);
      bctx.fillStyle = sky;
      bctx.fillRect(0, 0, bg.width, bg.height);

      for (let i = 0; i < 90; i++) {
        const sx = Math.random() * bg.width;
        const sy = Math.random() * bg.height;
        bctx.globalAlpha = Math.random() * 0.6 + 0.3;
        bctx.fillStyle = "#ffffff";
        bctx.beginPath();
        bctx.arc(sx, sy, Math.random() * 1.4 + 0.3, 0, Math.PI * 2);
        bctx.fill();
      }
      bctx.globalAlpha = 1;
    }

    // מציירים את התמונה האמיתית עצמה (ברגע שהיא נטענת — אם עדיין לא נטענה, נצייר כשתסתיים)
    function paintPhoto() {
      if (theme.mode === "field") {
        drawImageCover(bctx, theme.img, 0, 0, bg.width, bg.height);
      } else if (theme.mode === "rect") {
        // מלבן רחב יותר מגובה — כדי שהטבעות של שבתאי לא ייחתכו
        const w = theme.r * 2.6, h = theme.r * 2.1;
        drawImageCover(bctx, theme.img, theme.x - w / 2, theme.y - h / 2, w, h);
      } else {
        // כוכב לכת עגול: חותכים לעיגול ומוסיפים צל עדין לתחושת עומק
        bctx.save();
        bctx.beginPath();
        bctx.arc(theme.x, theme.y, theme.r, 0, Math.PI * 2);
        bctx.clip();
        const size = theme.r * 2;
        drawImageCover(bctx, theme.img, theme.x - size / 2, theme.y - size / 2, size, size);
        bctx.restore();

        const shade = bctx.createRadialGradient(
          theme.x - theme.r * 0.3, theme.y - theme.r * 0.3, theme.r * 0.2,
          theme.x, theme.y, theme.r
        );
        shade.addColorStop(0, "rgba(0,0,0,0)");
        shade.addColorStop(1, "rgba(0,0,0,0.35)");
        bctx.beginPath();
        bctx.arc(theme.x, theme.y, theme.r, 0, Math.PI * 2);
        bctx.fillStyle = shade;
        bctx.fill();
      }
    }

    if (theme.img.complete) paintPhoto();      // התמונה כבר בזיכרון (למשל טעונה מראש)
    else theme.img.onload = paintPhoto;        // אחרת מציירים אותה ברגע שהיא תיטען

    return bg;
  }

  const bgCache = {};   // כדי לא לצייר את אותה ערכת נושא כמה פעמים
  function getSpaceBackground(themeIndex) {
    if (!bgCache[themeIndex]) bgCache[themeIndex] = generateSpaceBackground(SPACE_THEMES[themeIndex]);
    return bgCache[themeIndex];
  }

  let currentBg = null;    // הרקע המצויר כרגע
  let hardBgIndex = 2;     // איזו ערכת נושא פעילה ברמת קשה (מתחיל מ-2, מסתובב עד 5)

  // =========================================================
  //  מנוע הצלילים 🔊
  //  הצלילים נוצרים מתוך הדפדפן עצמו — בלי קבצים חיצוניים.
  //  כל צליל הוא רצף של "צפצופים" (תווים) שמתנגנים אחד אחרי השני.
  // =========================================================
  let audioCtx;  // נפתח בלחיצה הראשונה (הדפדפן דורש זאת)

  // מנגן תו בודד: תדר (גובה הצליל), מתי להתחיל, וכמה זמן
  function playTone(frequency, startTime, duration) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = "triangle";              // סוג הצליל (נסו: "sine" / "square" / "sawtooth")
    osc.frequency.value = frequency;
    gain.gain.setValueAtTime(0.25, startTime);
    gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration); // דעיכה רכה
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(startTime);
    osc.stop(startTime + duration);
  }

  // מנגן רצף תווים (מנגינה קטנה)
  function playMelody(notes) {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let t = audioCtx.currentTime;
    for (const note of notes) {
      playTone(note.freq, t, note.dur);
      t += note.dur;
    }
  }

  // צליל ניצחון 🎉 — מנגינה עולה ושמחה (כשתופסים כוכב)
  function playWinSound() {
    playMelody([
      { freq: 660, dur: 0.10 },   // מי
      { freq: 880, dur: 0.14 },   // לה (גבוה יותר)
    ]);
  }

  // צליל כישלון 😢 — מנגינה יורדת ועצובה (כשהמשחק נגמר)
  function playLoseSound() {
    playMelody([
      { freq: 392, dur: 0.18 },   // סול
      { freq: 311, dur: 0.18 },   // מי במול
      { freq: 196, dur: 0.30 },   // סול נמוך
    ]);
  }

  // צליל זיקוקים 🎆 — פרץ מהיר של "פצפוצים" גבוהים ואקראיים (מוקש+כוכב מתנגשים)
  function playFireworkSound() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let t = audioCtx.currentTime;
    for (let i = 0; i < 6; i++) {
      const freq = 700 + Math.random() * 1300;   // תדר אקראי גבוה = "פצפוץ"
      playTone(freq, t, 0.06);
      t += 0.02;                                  // כל פצפוץ מתחיל רגע אחרי הקודם
    }
  }

  // צליל פאנפרה 🎺 — מנגינה עולה וחגיגית (מעבר שלב / ניצחון)
  function playFanfareSound() {
    playMelody([
      { freq: 523, dur: 0.12 },   // דו
      { freq: 659, dur: 0.12 },   // מי
      { freq: 784, dur: 0.12 },   // סול
      { freq: 1047, dur: 0.28 },  // דו גבוה
    ]);
  }

  // --- מציג מסך עם הודעה וכפתורים ---
  // משמש לכל המסכים: פתיחה, מעבר שלב, ניצחון וסיום.
  // buttons = רשימה של { label, action } — לכל כפתור טקסט ופעולה ללחיצה.
  function showScreen(message, buttons) {
    screenMessage.innerHTML = message;
    screenButtons.innerHTML = "";
    for (const b of buttons) {
      const btn = document.createElement("button");
      btn.className = "diffBtn";
      btn.textContent = b.label;
      btn.onclick = b.action;
      screenButtons.appendChild(btn);
    }
    startScreen.style.display = "block";
  }

  // --- ממיר טקסט חופשי (שם שחקן) ל-HTML בטוח, כדי שלא יהיה אפשר "להזריק" קוד ---
  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  // --- בונה HTML של טבלת שלושת השחקנים המובילים (אם יש) ---
  function renderLeaderboard() {
    const board = JSON.parse(localStorage.getItem("starsLeaderboard") || "[]");
    if (board.length === 0) return "";
    const medals = ["🥇", "🥈", "🥉"];
    let html = '<div id="leaderboardBox"><div class="lbTitle">🏆 שלושת הראשונים</div>';
    board.forEach((entry, i) => {
      html += '<div class="lbRow">' + medals[i] + " " + escapeHtml(entry.name) + " — " + entry.score + " כוכבים</div>";
    });
    html += "</div>";
    return html;
  }

  // --- שומר ניקוד סופי בטבלת השיאים, ומשאיר רק את 3 המובילים ---
  function saveScoreToLeaderboard(name, finalScore) {
    const board = JSON.parse(localStorage.getItem("starsLeaderboard") || "[]");
    board.push({ name: name, score: finalScore });
    board.sort((a, b) => b.score - a.score);   // מהניקוד הגבוה לנמוך
    board.length = Math.min(board.length, 3);  // רק 3 המקומות הראשונים
    localStorage.setItem("starsLeaderboard", JSON.stringify(board));
  }

  // --- מסך הפתיחה: שם שחקן + טבלת שיאים + כפתור התחלה ---
  function showStartScreen() {
    const savedName = localStorage.getItem("starsPlayerName") || "";
    screenMessage.innerHTML =
      "⭐ כוכבים נופלים ⭐<br>אספו 20 כוכבים כדי לעבור שלב!<br>היזהרו מהמוקשים 💣" +
      '<div class="nameRow">השם שלי: <input id="playerNameInput" type="text" maxlength="12" placeholder="הקלידו שם"></div>' +
      '<div class="nameError" id="nameError"></div>' +
      renderLeaderboard();
    document.getElementById("playerNameInput").value = savedName;

    screenButtons.innerHTML = "";
    const btn = document.createElement("button");
    btn.className = "diffBtn";
    btn.textContent = "התחל משחק 🎮";
    btn.onclick = startNewRun;
    screenButtons.appendChild(btn);

    startScreen.style.display = "block";
  }

  // --- מתחילים ריצה חדשה מההתחלה (תמיד רמת "קל") --- שם שחקן הוא שדה חובה
  function startNewRun() {
    const input = document.getElementById("playerNameInput");
    const name = input ? input.value.trim() : "";
    const errorEl = document.getElementById("nameError");

    if (!name) {   // בלי שם — לא מתחילים, ומראים הודעה
      if (errorEl) errorEl.textContent = "נא להקליד שם לפני שמתחילים ✏️";
      if (input) { input.classList.add("invalid"); input.focus(); }
      return;
    }

    if (input) input.classList.remove("invalid");
    if (errorEl) errorEl.textContent = "";

    playerName = name;
    localStorage.setItem("starsPlayerName", playerName);   // זוכרים את השם לפעם הבאה
    totalScore = 0;                                        // מאפסים את סך הניקוד לריצה חדשה
    startLevel("easy");
  }

  // --- טוענים רמה מסוימת ומתחילים לשחק בה ---
  function startLevel(level) {
    currentLevel = level;
    const d = DIFFICULTIES[level];   // המספרים של הרמה הזו
    STARTING_LIVES  = d.lives;
    BASKET_WIDTH    = d.basketWidth;
    STAR_FALL_SPEED = d.starSpeed;
    STAR_SPAWN_RATE = d.starRate;
    MINE_FALL_SPEED = d.mineSpeed;
    MINE_SPAWN_RATE = d.mineRate;

    basketX = canvas.width / 2 - BASKET_WIDTH / 2;
    score = 0;                 // הניקוד מתחיל מ-0 בכל רמה
    lives = STARTING_LIVES;
    stars = [];
    mines = [];
    particles = [];
    frameCount = 0;
    isPlaying = true;
    startScreen.style.display = "none";

    // בוחרים את רקע החלל של השלב: קל=0, בינוני=1, קשה=מתחיל מ-2 ומתחלף כל 15 כוכבים
    if (level === "easy")   currentBg = getSpaceBackground(0);
    if (level === "medium") currentBg = getSpaceBackground(1);
    if (level === "hard")   { hardBgIndex = 2; currentBg = getSpaceBackground(hardBgIndex); }

    updateScoreboard();
    loop();
  }

  // --- הגענו ליעד הנקודות! עוברים לרמה הבאה, או מנצחים ---
  function advanceLevel() {
    isPlaying = false;
    playFanfareSound();              // 🎺 צליל חגיגי
    const next = DIFFICULTIES[currentLevel].next;
    if (next) {
      // יש רמה הבאה — מציגים מסך מעבר שלב
      // אם הרמה הבאה אינסופית (אין לה יעד) — מוסיפים הסבר לשחקן
      const nextIsEndless = !isFinite(DIFFICULTIES[next].target);
      showScreen(
        "כל הכבוד! 🎉 סיימת את הרמה " + DIFFICULTIES[currentLevel].name +
        "<br>הרמה הבאה: " + DIFFICULTIES[next].name +
        (nextIsEndless ? "<br>רמה זו אינסופית ⭐ תפסו הכי הרבה כוכבים שאפשר!" : ""),
        [ { label: "המשך ➡️", action: () => startLevel(next) } ]
      );
    } else {
      // אין רמה הבאה — ניצחון מוחלט! שומרים את הניקוד בטבלת השיאים
      saveScoreToLeaderboard(playerName, totalScore);
      showScreen(
        "🏆 ניצחת! 🏆<br>עברת את כל הרמות — אלוף הכוכבים! ⭐" +
        "<br>" + playerName + ", סה\"כ אספת " + totalScore + " כוכבים" +
        renderLeaderboard(),
        [ { label: "שחק מחדש 🔄", action: startNewRun } ]
      );
    }
  }

  // --- מצייר כוכב תלת-ממדי מבריק במקום מסוים ---
  function drawStar(x, y, size, rotation) {
    ctx.save();
    ctx.translate(x, y);       // מזיזים את "העט" למרכז הכוכב
    ctx.rotate(rotation);      // מסובבים אותו — נותן תחושת תלת-ממד

    // בונים את צורת הכוכב (5 קצוות חיצוניים ו-5 פנימיים)
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const angle = (Math.PI / 2.5) * i - Math.PI / 2;
      ctx.lineTo(Math.cos(angle) * size, Math.sin(angle) * size);
      const inner = (Math.PI / 2.5) * i - Math.PI / 2 + Math.PI / 5;
      ctx.lineTo(Math.cos(inner) * (size / 2), Math.sin(inner) * (size / 2));
    }
    ctx.closePath();

    // צל מתחת לכוכב — נותן תחושה שהוא "מרחף" מעל הרקע
    ctx.shadowColor = "rgba(0,0,0,0.5)";
    ctx.shadowBlur = 8;
    ctx.shadowOffsetX = 3;
    ctx.shadowOffsetY = 4;

    // מילוי במעבר צבעים (gradient): בהיר במרכז-עליון, כהה בקצה.
    // זה הסוד שגורם לכוכב להיראות תלת-ממדי ומבריק כמו מתכת.
    const grad = ctx.createRadialGradient(-size / 3, -size / 3, size / 8, 0, 0, size);
    grad.addColorStop(0,   "#fff3c4");   // נקודת אור בהירה (ה"ברק")
    grad.addColorStop(0.5, "#fbbc46");   // צהוב המותג
    grad.addColorStop(1,   "#c8860a");   // צל כתום-כהה
    ctx.fillStyle = grad;
    ctx.fill();

    // קו מתאר כהה — מדגיש את הקצוות ומחזק את העומק
    ctx.shadowColor = "transparent";     // מבטלים צל בשביל הקו עצמו
    ctx.lineWidth = 1.5;
    ctx.strokeStyle = "#a86c00";
    ctx.stroke();

    ctx.restore();             // מחזירים את ה"עט" למצב הרגיל
  }

  // --- מצייר מוקש 💣 (כדור כהה עם קוצים) ---
  function drawMine(x, y, size) {
    ctx.save();
    ctx.translate(x, y);

    // הקוצים מסביב למוקש
    ctx.strokeStyle = "#e02d2d";
    ctx.lineWidth = 3;
    for (let i = 0; i < 8; i++) {
      const angle = (Math.PI / 4) * i;
      ctx.beginPath();
      ctx.moveTo(Math.cos(angle) * size, Math.sin(angle) * size);
      ctx.lineTo(Math.cos(angle) * (size + 6), Math.sin(angle) * (size + 6));
      ctx.stroke();
    }

    // גוף המוקש — כדור כהה עם מעט נפח (gradient)
    const grad = ctx.createRadialGradient(-size / 3, -size / 3, size / 6, 0, 0, size);
    grad.addColorStop(0, "#777");
    grad.addColorStop(1, "#1a1a1a");
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, size, 0, Math.PI * 2);
    ctx.fill();

    // נקודה אדומה מהבהבת במרכז — "סכנה!"
    ctx.fillStyle = "#ff3b3b";
    ctx.beginPath();
    ctx.arc(0, 0, size / 4, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  // --- יוצר פיצוץ זיקוקים 🎆 במקום מסוים (כשכוכב ומוקש מתנגשים) ---
  function spawnFirework(x, y) {
    const colors = ["#ff5e5e", "#fbbc46", "#42bbc8", "#a86cff", "#5eff8f", "#ffffff"];
    for (let i = 0; i < 24; i++) {
      // כל ניצוץ יורה בזווית קצת אחרת סביב מעגל שלם — ככה נוצרת צורת "פיצוץ"
      const angle = (Math.PI * 2 * i) / 24 + Math.random() * 0.3;
      const speed = 2 + Math.random() * 3;
      particles.push({
        x: x, y: y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        color: colors[Math.floor(Math.random() * colors.length)],
        life: 1,        // 1 = ניצוץ מלא. יורד בהדרגה עד 0 ואז נעלם.
      });
    }
  }

  // --- מזיז ומצייר את כל ניצוצות הזיקוקים הפעילים ---
  function updateAndDrawParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.08;      // כוח משיכה קל — הניצוצות שוקעות למטה
      p.life -= 0.03;    // דהייה הדרגתית
      if (p.life <= 0) { particles.splice(i, 1); continue; }

      ctx.globalAlpha = p.life;   // ככל שהחיים נגמרים — הניצוץ נעשה שקוף יותר
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }

  // --- מצייר את הסלסלה ---
  function drawBasket() {
    const y = canvas.height - 30;
    ctx.fillStyle = "#42bbc8";
    ctx.beginPath();
    ctx.moveTo(basketX, y);
    ctx.lineTo(basketX + BASKET_WIDTH, y);
    ctx.lineTo(basketX + BASKET_WIDTH - 12, y + 28);
    ctx.lineTo(basketX + 12, y + 28);
    ctx.closePath();
    ctx.fill();
    // קווי הקש של הסלסלה
    ctx.strokeStyle = "#282355";
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // --- מעדכן את לוח הניקוד למעלה ---
  function updateScoreboard() {
    scoreEl.textContent = score;
    // אם אין יעד (רמה אינסופית) — מציגים סימן אינסוף ∞ במקום מספר
    targetEl.textContent = isFinite(DIFFICULTIES[currentLevel].target)
      ? DIFFICULTIES[currentLevel].target
      : "∞";
    levelEl.textContent = DIFFICULTIES[currentLevel].name;      // שם הרמה
    livesEl.textContent = "❤️".repeat(lives) || "💔";
    totalScoreEl.textContent = totalScore;                      // סך הכוכבים בריצה הנוכחית

    // אם הניקוד הנוכחי עבר את השיא — מעדכנים ושומרים בזיכרון
    if (score > highScore) {
      highScore = score;
      localStorage.setItem("starsHighScore", highScore);
    }
    highScoreEl.textContent = highScore;
  }

  // --- הלולאה הראשית: רצה ~60 פעמים בשנייה ---
  function loop() {
    if (!isPlaying) return;
    frameCount++;

    // מנקים את המסך ומציירים את רקע החלל (כוכבי הלכת) של השלב הנוכחי
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (currentBg) ctx.drawImage(currentBg, 0, 0);

    // יוצרים כוכב חדש מדי פעם, במיקום אקראי
    if (frameCount % STAR_SPAWN_RATE === 0) {
      const x = Math.random() * (canvas.width - STAR_SIZE * 2) + STAR_SIZE;
      // rot = הזווית הנוכחית, spin = כמה מהר הכוכב מסתובב (אקראי לכל כוכב)
      stars.push({ x: x, y: -STAR_SIZE, rot: 0, spin: (Math.random() - 0.5) * 0.1 });
    }

    // יוצרים מוקש חדש מדי פעם, במיקום אקראי
    if (frameCount % MINE_SPAWN_RATE === 0) {
      const mx = Math.random() * (canvas.width - MINE_SIZE * 2) + MINE_SIZE;
      mines.push({ x: mx, y: -MINE_SIZE });
    }

    // מזיזים את הסלסלה לפי המקלדת
    if (moveLeft)  basketX -= BASKET_SPEED;
    if (moveRight) basketX += BASKET_SPEED;
    // לא נותנים לסלסלה לצאת מהמסך
    basketX = Math.max(0, Math.min(canvas.width - BASKET_WIDTH, basketX));

    // מזיזים ומציירים כל כוכב
    const basketY = canvas.height - 30;
    for (let i = stars.length - 1; i >= 0; i--) {
      const star = stars[i];
      star.y += STAR_FALL_SPEED;
      star.rot += star.spin;     // מסובבים את הכוכב מעט → תחושת תלת-ממד
      drawStar(star.x, star.y, STAR_SIZE, star.rot);

      // האם הכוכב נתפס בסלסלה?
      const caught = star.y + STAR_SIZE > basketY &&
                     star.x > basketX &&
                     star.x < basketX + BASKET_WIDTH;
      if (caught) {
        score++;
        totalScore++;          // סופרים גם לסך הכל של כל הריצה (לטבלת השיאים)
        stars.splice(i, 1);   // מוחקים את הכוכב שנתפס
        updateScoreboard();
        playWinSound();        // 🎉 צליל ניצחון!

        // ברמת קשה: כל 15 כוכבים מחליפים לכוכב לכת אחר ברקע 🌌
        if (currentLevel === "hard" && score % 15 === 0) {
          const hardThemeCount = SPACE_THEMES.length - 2;   // כמה ערכות נושא שמורות לרמת קשה (2..5)
          hardBgIndex = 2 + ((hardBgIndex - 2 + 1) % hardThemeCount);
          currentBg = getSpaceBackground(hardBgIndex);
        }

        if (score >= DIFFICULTIES[currentLevel].target) {  // הגענו ליעד?
          advanceLevel();
          return;
        }
        continue;
      }

      // האם הכוכב נפל לרצפה?
      if (star.y > canvas.height) {
        stars.splice(i, 1);
        lives--;
        updateScoreboard();
        if (lives <= 0) {
          gameOver();
          return;
        }
      }
    }

    // מזיזים ומציירים כל מוקש
    for (let i = mines.length - 1; i >= 0; i--) {
      const mine = mines[i];
      mine.y += MINE_FALL_SPEED;
      drawMine(mine.x, mine.y, MINE_SIZE);

      // האם הסלסלה תפסה מוקש? אם כן — מאבדים לב אחד! 💥
      const hit = mine.y + MINE_SIZE > basketY &&
                  mine.x > basketX &&
                  mine.x < basketX + BASKET_WIDTH;
      if (hit) {
        mines.splice(i, 1);     // המוקש התפוצץ — מוחקים אותו
        lives--;                // מאבדים לב אחד
        updateScoreboard();
        if (lives <= 0) {       // רק אם נגמרו כל הלבבות — סוף משחק
          gameOver();
          return;
        }
        playLoseSound();        // צליל "אאוץ'" על הפגיעה
        continue;
      }

      // מוקש שנפל לרצפה בלי שנתפס — התחמקנו ממנו, פשוט מוחקים אותו
      if (mine.y > canvas.height) {
        mines.splice(i, 1);
      }
    }

    // בודקים התנגשות בין מוקש לכוכב באוויר — שניהם מתפוצצים בזיקוקים! 🎆
    for (let i = mines.length - 1; i >= 0; i--) {
      const mine = mines[i];
      for (let j = stars.length - 1; j >= 0; j--) {
        const star = stars[j];
        const dx = mine.x - star.x;
        const dy = mine.y - star.y;
        const touching = Math.sqrt(dx * dx + dy * dy) < MINE_SIZE + STAR_SIZE;
        if (touching) {
          spawnFirework((mine.x + star.x) / 2, (mine.y + star.y) / 2);
          playFireworkSound();
          mines.splice(i, 1);
          stars.splice(j, 1);
          break;   // המוקש הזה כבר התפוצץ — עוברים לבדוק את המוקש הבא
        }
      }
    }

    updateAndDrawParticles();   // מציירים את כל הזיקוקים הפעילים כרגע

    drawBasket();
    requestAnimationFrame(loop);   // מבקשים לצייר את הפריים הבא
  }

  // --- סוף משחק ---
  function gameOver() {
    isPlaying = false;
    playLoseSound();           // 😢 צליל כישלון!
    saveScoreToLeaderboard(playerName, totalScore);   // שומרים את הניקוד הסופי בטבלת השיאים
    showScreen(
      "המשחק נגמר 🌟<br>הגעת לרמה " + DIFFICULTIES[currentLevel].name +
      "<br>" + playerName + ", סה\"כ אספת " + totalScore + " כוכבים" +
      renderLeaderboard(),
      [ { label: "נסה שוב מההתחלה 🔄", action: startNewRun } ]
    );
  }

  // ====== שליטה במקלדת ======
  document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowLeft")  moveLeft = true;
    if (e.key === "ArrowRight") moveRight = true;
  });
  document.addEventListener("keyup", (e) => {
    if (e.key === "ArrowLeft")  moveLeft = false;
    if (e.key === "ArrowRight") moveRight = false;
  });

  // ====== שליטה בעכבר ובמגע (לנייד) ======
  function moveBasketTo(clientX) {
    const rect = canvas.getBoundingClientRect();
    const scale = canvas.width / rect.width;
    basketX = (clientX - rect.left) * scale - BASKET_WIDTH / 2;
  }
  canvas.addEventListener("mousemove", (e) => moveBasketTo(e.clientX));
  canvas.addEventListener("touchmove", (e) => {
    moveBasketTo(e.touches[0].clientX);
    e.preventDefault();
  }, { passive: false });

  // כשהדף נטען — מציגים את מסך בחירת הרמה (המשחק מתחיל רק אחרי בחירה)
  showStartScreen();
  </script>
</body>
