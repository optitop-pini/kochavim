<!DOCTYPE html>
<!--
  ============================================================
   משחק: כוכבים נופלים  ⭐
   נבנה עבור עומר כדי ללמוד לתכנת עם Claude Code
  ============================================================

  איך משחקים?
  - מזיזים את הסלסלה ימינה ושמאלה עם החיצים במקלדת (או עם העכבר / האצבע בנייד).
  - תופסים כוכבים שנופלים מלמעלה — כל כוכב = נקודה.
  - אם כוכב נופל לרצפה — מאבדים "חיים". יש 3 חיים.

  --- אזור ההגדרות למטה (ALL CAPS) זה המקום הכי כיף לשחק איתו ---
  שנו את המספרים, שמרו, ורעננו את הדף בדפדפן כדי לראות מה קרה.
-->
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>כוכבים נופלים ⭐</title>
  <style>
    /* ====== עיצוב המסך ====== */
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(#0b1026, #1b2a6b);
      color: white;
      text-align: center;
      overflow: hidden;
      user-select: none;
    }
    h1 { margin: 10px 0 4px; font-size: 24px; }
    #lhuh { font-size: 14px; opacity: .8; margin: 0 0 8px; }
    #scoreboard {
      font-size: 20px;
      margin: 6px;
    }
    canvas {
      background: linear-gradient(#0b1026, #243b8f);
      border: 3px solid #42bbc8;
      border-radius: 12px;
      display: block;
      margin: 0 auto;
      max-width: 96vw;
      touch-action: none;
    }
    /* רעידת מסך כשמוקש פוגע בסלסלה 💥 (רעיון עומר) — המסך מרטט מהר במקום וחוזר */
    @keyframes shake {
      0%, 100% { transform: translate(0, 0); }
      15% { transform: translate(-8px, 4px); }
      30% { transform: translate(7px, -6px); }
      45% { transform: translate(-6px, -4px); }
      60% { transform: translate(6px, 5px); }
      75% { transform: translate(-4px, 3px); }
      90% { transform: translate(3px, -2px); }
    }
    canvas.shake { animation: shake 0.35s ease-in-out; }
    #startScreen {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,.8);
      padding: 26px 36px;
      border-radius: 16px;
      font-size: 22px;
      border: 2px solid #42bbc8;
    }
    #screenMessage { font-size: 20px; margin-bottom: 8px; color: #fbbc46; }
    #screenTitle  { font-size: 24px; margin-bottom: 16px; font-weight: bold; }
    .diffBtn {
      display: block;
      width: 200px;
      margin: 10px auto;
      padding: 12px 22px;
      font-size: 20px;
      border: none;
      border-radius: 10px;
      background: #fbbc46;
      color: #282355;
      font-weight: bold;
      cursor: pointer;
    }
    .diffBtn:hover { background: #ffd277; }
    .nameRow { margin: 12px 0 4px; font-size: 16px; }
    .nameRow input {
      margin-inline-start: 6px;
      padding: 6px 10px;
      border-radius: 8px;
      border: 1px solid #42bbc8;
      font-size: 16px;
      width: 140px;
      text-align: center;
      background: #0b1026;
      color: white;
    }
    .nameRow input.invalid { border-color: #ff5e5e; }
    .nameError { color: #ff5e5e; font-size: 14px; min-height: 18px; margin-top: 4px; }
    .colorRow { margin: 10px 0; font-size: 16px; }
    .colorRow input {
      margin-inline-start: 8px;
      width: 44px;
      height: 32px;
      padding: 0;
      border: 1px solid #42bbc8;
      border-radius: 8px;
      background: none;
      cursor: pointer;
      vertical-align: middle;
    }
    #leaderboardBox { margin-top: 14px; font-size: 16px; }
    .lbTitle { font-weight: bold; margin-bottom: 6px; color: #fbbc46; }
    .lbRow { margin: 2px 0; }

    /* ====== מרוץ עם חבר 🏁 (רעיון עומר) — כפתור שיתוף + חלון קוד ====== */
    #shareBtn {
      position: fixed;
      top: 12px;
      inset-inline-end: 12px;   /* בצד — מתאים גם ל-RTL וגם ל-LTR */
      z-index: 60;
      padding: 6px 14px;
      font-size: 14px;
      border: none;
      border-radius: 20px;
      background: #42bbc8;
      color: #282355;
      font-weight: bold;
      cursor: pointer;
    }
    #shareModal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 70;
      background: rgba(0,0,0,.6);
      align-items: center;
      justify-content: center;
    }
    #shareModal.active { display: flex; }
    #shareModalBox {
      background: #12183f;
      border: 2px solid #42bbc8;
      border-radius: 16px;
      padding: 22px 28px;
      max-width: 320px;
      width: 85%;
      text-align: center;
    }
    .shareTitle { font-size: 20px; font-weight: bold; color: #fbbc46; margin-bottom: 14px; }
    .shareHint { font-size: 14px; opacity: .85; margin-top: 10px; }
    #shareCodeBig {
      font-size: 40px;
      font-weight: bold;
      letter-spacing: 4px;
      color: #42bbc8;
      background: #0b1026;
      border-radius: 10px;
      padding: 10px;
      margin: 8px 0;
      direction: ltr;   /* הקוד עצמו תמיד משמאל-לימין, גם בעמוד עברי */
    }
    #joinCodeInput {
      font-size: 22px;
      text-align: center;
      letter-spacing: 3px;
      width: 140px;
      padding: 6px;
      border-radius: 8px;
      border: 1px solid #42bbc8;
      background: #0b1026;
      color: white;
      direction: ltr;
    }
    #shareCloseBtn {
      margin-top: 14px;
      background: none;
      border: 1px solid #42bbc8;
      color: white;
      padding: 6px 18px;
      border-radius: 10px;
      cursor: pointer;
    }
    #raceStatus { font-size: 15px; margin-top: 4px; color: #5eff8f; min-height: 18px; }
  </style>
</head>
<body>

  <!-- כפתור "מרוץ עם חבר" (רעיון עומר) — קטן, בצד, לא מפריע למשחק -->
  <button id="shareBtn">🔗 שתף</button>

  <h1>⭐ כוכבים נופלים ⭐</h1>
  <p id="lhuh">הזיזו את הסלסלה עם החיצים ← → ותפסו כוכבים!</p>
  <div id="scoreboard">רמה: <span id="level">קל 🟢</span> &nbsp;|&nbsp; ניקוד: <span id="score">0</span> / <span id="target">20</span> &nbsp;|&nbsp; חיים: <span id="lives">❤️❤️❤️❤️❤️</span> &nbsp;|&nbsp; סה"כ: <span id="totalScoreDisplay">0</span> &nbsp;|&nbsp; 🏆 שיא: <span id="highScore">0</span></div>
  <div id="raceStatus"></div>

  <canvas id="game" width="600" height="500"></canvas>

  <!-- חלון "מרוץ עם חבר" — שיתוף קוד או הצטרפות עם קוד -->
  <div id="shareModal">
    <div id="shareModalBox">
      <div id="shareChoiceView">
        <div class="shareTitle">מרוץ עם חבר 🏁</div>
        <button class="diffBtn" id="shareCreateBtn">שתף קוד 📤</button>
        <button class="diffBtn" id="shareJoinBtn">הצטרף עם קוד 📥</button>
      </div>
      <div id="shareCodeView" style="display:none;">
        <div class="shareTitle">הקוד שלך:</div>
        <div id="shareCodeBig"></div>
        <div class="shareHint">ספר את הקוד לחבר שלך — הוא יקליד אותו כדי להצטרף!</div>
      </div>
      <div id="shareJoinView" style="display:none;">
        <div class="shareTitle">הקלד את הקוד של החבר:</div>
        <input id="joinCodeInput" type="text" maxlength="6" placeholder="ABC123">
        <br>
        <button class="diffBtn" id="joinSubmitBtn">הצטרף למרוץ 🏁</button>
        <div id="joinError" class="nameError"></div>
      </div>
      <button id="shareCloseBtn">סגור</button>
    </div>
  </div>

  <div id="startScreen">
    <div id="screenMessage"></div>
    <div id="screenButtons"></div>
  </div>

  <!-- ספריית Firebase לטבלת שיאים מקוונת (משותפת לכל השחקנים) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <script>
  // =========================================================
  //  אזור ההגדרות — כאן הכי כיף לשנות! ⚙️
  //  (נסו לשנות מספר, לשמור, ולרענן את הדף)
  // =========================================================
  // לכל רמת קושי יש מספרים משלה. שנו אותם, שמרו, ובחרו את הרמה במסך הפתיחה.
  const DIFFICULTIES = {
    easy: {                 // קל 🟢
      name: "קל 🟢",
      target: 20,           // כמה כוכבים צריך לאסוף כדי לעבור לרמה הבאה
      next: "medium",       // הרמה הבאה אחרי שמסיימים
      lives: 5,             // כמה לבבות מתחילים איתם
      basketWidth: 120,     // רוחב הסלסלה (גדול = קל יותר לתפוס)
      starSpeed: 2,         // מהירות נפילת הכוכבים
      starRate: 70,         // כל כמה זמן נופל כוכב (מספר קטן = יותר כוכבים)
      mineSpeed: 2.5,       // מהירות נפילת המוקשים
      mineRate: 260,        // כל כמה זמן נופל מוקש (מספר גדול = פחות מוקשים)
    },
    medium: {               // בינוני 🟡
      name: "בינוני 🟡",
      target: 15,
      next: "hard",
      lives: 4,
      basketWidth: 90,
      starSpeed: 3,
      starRate: 60,
      mineSpeed: 3.5,
      mineRate: 150,
    },
    hard: {                 // קשה 🔴
      name: "קשה 🔴",
      target: Infinity,     // אין יעד — הרמה אינסופית! ממשיכים עד שנגמרים הלבבות
      next: null,           // אין רמה הבאה — משחקים "קשה" עד הסוף
      lives: 3,
      basketWidth: 65,
      starSpeed: 4.5,
      starRate: 45,
      mineSpeed: 5,
      mineRate: 90,
    },
  };

  // הגדרות שלא משתנות בין הרמות:
  const BASKET_SPEED = 7;    // מהירות תזוזת הסלסלה
  const STAR_SIZE    = 22;   // גודל הכוכב
  const MINE_SIZE    = 18;   // גודל המוקש

  // --- כוכב-על ⭐✨ (נדיר, גדול, שווה יותר נקודות) ---
  const SUPER_STAR_CHANCE = 0.12;  // הסיכוי שכוכב חדש יהיה כוכב-על (0.12 = 12%)
  const SUPER_STAR_SIZE   = 34;    // גודל כוכב-על (גדול יותר מכוכב רגיל)
  const SUPER_STAR_VALUE  = 5;     // כמה נקודות שווה כוכב-על (במקום 1)

  // --- כוכב זהב ⭐ (נדיר מאוד! שווה הכי הרבה נקודות) — רעיון של עומר ---
  const GOLD_STAR_CHANCE  = 0.03;  // נדיר מאוד — רק 3% מהכוכבים
  const GOLD_STAR_SIZE    = 38;    // הכי גדול
  const GOLD_STAR_VALUE   = 10;    // שווה 10 נקודות!

  // --- בלון הניקוד 🎈 (רעיון של עומר) — מופיע כל 25 שניות, מראה כמה נקודות יש לך ---
  const BALLOON_SPAWN_FRAMES = 1500;  // כל כמה פריימים מופיע בלון (בערך 25 שניות, בהנחת 60 פריימים לשנייה)
  const BALLOON_SIZE   = 26;      // גודל הבלון
  const BALLOON_SPEED  = 1.5;     // כמה מהר הבלון עף למעלה
  const BALLOON_COLORS = ["#ff5e5e", "#42bbc8", "#8e6fff", "#5eff8f", "#fbbc46"];  // צבעים אפשריים לבלון
  const BALLOON_TINT_FRAMES = 180;    // כמה זמן הרקע נצבע בצבע הבלון אחרי שתופסים אותו (כ-3 שניות)
  const LEVELUP_BALLOON_SIZE = 38;    // בלון גדול יותר במיוחד — מכריז שעברנו שלב (רעיון עומר)

  // אלה ימולאו לפי הרמה שנבחרת (מתחילים עם ערכי "בינוני" כברירת מחדל)
  let STARTING_LIVES  = DIFFICULTIES.medium.lives;
  let BASKET_WIDTH    = DIFFICULTIES.medium.basketWidth;
  let STAR_FALL_SPEED = DIFFICULTIES.medium.starSpeed;
  let STAR_SPAWN_RATE = DIFFICULTIES.medium.starRate;
  let MINE_FALL_SPEED = DIFFICULTIES.medium.mineSpeed;
  let MINE_SPAWN_RATE = DIFFICULTIES.medium.mineRate;

  // =========================================================
  //  מכאן והלאה זה ה"מנוע" של המשחק.
  //  אפשר להציץ, ובהמשך גם לשנות — אבל לא חובה כדי לשחק.
  // =========================================================

  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const scoreEl = document.getElementById("score");
  const targetEl = document.getElementById("target");
  const levelEl = document.getElementById("level");
  const livesEl = document.getElementById("lives");
  const highScoreEl = document.getElementById("highScore");
  const totalScoreEl = document.getElementById("totalScoreDisplay");
  const startScreen = document.getElementById("startScreen");
  const screenMessage = document.getElementById("screenMessage");
  const screenButtons = document.getElementById("screenButtons");

  let basketX, basketY, score, lives, stars, mines, particles, balloons, frameCount, isPlaying;
  let balloonTintColor = null;   // צבע הרקע הזמני אחרי תפיסת בלון (null = אין צביעה כרגע)
  let balloonTintFramesLeft = 0;
  let currentLevel = "easy";   // הרמה שבה משחקים כרגע (תמיד מתחילים מ"קל")
  let playerName = "שחקן אלמוני";   // שם השחקן הנוכחי
  let basketColor = "#42bbc8";       // צבע הסלסלה (רעיון עומר) — אפשר לבחור צבע אישי
  let totalScore = 0;               // סך כל הכוכבים שנאספו בריצה הנוכחית (לכל השלבים ביחד)
  let moveLeft = false, moveRight = false, moveUp = false, moveDown = false;

  // הסלסלה יכולה לעוף למעלה ולמטה בטווח מוגבל (רעיון של עומר) — לא עד קצה המסך ממש
  const BASKET_HEIGHT = 28;              // עובי הסלסלה (לבדיקת תפיסה מדויקת)
  const BASKET_MAX_Y  = canvas.height - 30;  // הכי נמוך שהסלסלה יכולה להיות (המקום המקורי, למטה)
  const BASKET_MIN_Y  = 180;                 // הכי גבוה שהסלסלה יכולה לעוף
  // בנייד: הסלסלה מופיעה מעל האצבע (בערך סלסלה וחצי), כדי שהאצבע לא תסתיר אותה (רעיון עומר)
  const TOUCH_LIFT    = BASKET_HEIGHT * 1.5;

  // איפוס טבלת השיאים לכל השחקנים — עולה פעם אחת עם כל גרסה חדשה של המשחק.
  // מי שכבר שיחק בגרסה ישנה יתחיל מחדש מ-0 ברגע שהוא פותח את הגרסה הזו.
  const SAVE_VERSION = "2";
  if (localStorage.getItem("starsSaveVersion") !== SAVE_VERSION) {
    localStorage.removeItem("starsLeaderboard");
    localStorage.removeItem("starsHighScore");
    localStorage.setItem("starsSaveVersion", SAVE_VERSION);
  }

  // =========================================================
  //  🌐 טבלת שיאים מקוונת (Firebase) — משותפת לכל השחקנים
  //  להחליף את הערכים למטה בפרטי הפרויקט שלכם מ-Firebase Console
  //  (Project settings → Your apps → פרטי ה-Web app)
  // =========================================================
  const firebaseConfig = {
    apiKey: "AIzaSyANCgKg3Po4vyXB-VYVDfCGmyAL_wVbwDs",
    authDomain: "kochavim-game.firebaseapp.com",
    projectId: "kochavim-game",
    storageBucket: "kochavim-game.firebasestorage.app",
    messagingSenderId: "411673418851",
    appId: "1:411673418851:web:4b543de32d0085a3fa2c56",
  };

  let firebaseReady = false;
  let db = null;
  try {
    if (firebaseConfig.apiKey !== "REPLACE_ME") {
      firebase.initializeApp(firebaseConfig);
      db = firebase.firestore();
      firebaseReady = true;
    }
  } catch (e) {
    firebaseReady = false;   // אם ההגדרה שגויה או שאין רשת — פשוט ממשיכים בלי הטבלה המקוונת
  }

  // שולחים ניקוד לטבלה המקוונת (לא קורס אם אין רשת/הגדרה — פשוט מתעלמים)
  function saveScoreOnline(name, score) {
    if (!firebaseReady) return;
    db.collection("scores").add({ name: name, score: score, ts: Date.now() }).catch(() => {});
  }

  // מביא את 3 הניקודים הגבוהים ביותר מכל השחקנים (מחזיר Promise)
  function fetchTopScoresOnline() {
    if (!firebaseReady) return Promise.resolve(null);   // null = "אין חיבור, השתמשו בנתונים המקומיים"
    return db.collection("scores").orderBy("score", "desc").limit(3).get()
      .then((snapshot) => snapshot.docs.map((doc) => doc.data()))
      .catch(() => null);
  }

  // =========================================================
  //  🏁 מרוץ ניקוד חי עם חבר (רעיון עומר) — כל אחד משחק לבד,
  //  אבל רואים את הניקוד של החבר מתעדכן בזמן אמת דרך Firestore.
  // =========================================================
  let raceCode = null;         // הקוד של המרוץ הנוכחי (null = לא מחוברים)
  let raceRole = null;         // "host" (מי שיצר את הקוד) או "guest" (מי שהצטרף)
  let raceUnsubscribe = null;  // פונקציה לעצירת ההאזנה בזמן אמת

  function generateRaceCode() {
    return Math.random().toString(36).slice(2, 7).toUpperCase();   // 5 תווים, קל להקריא לחבר
  }

  // --- מציגים/מסתירים את חלון "מרוץ עם חבר" ---
  function openShareModal() {
    showShareChoiceView();
    document.getElementById("shareModal").classList.add("active");
  }
  function closeShareModal() {
    document.getElementById("shareModal").classList.remove("active");   // רק סוגר את החלון, לא מנתק מהמרוץ
  }
  function showShareChoiceView() {
    document.getElementById("shareChoiceView").style.display = "block";
    document.getElementById("shareCodeView").style.display = "none";
    document.getElementById("shareJoinView").style.display = "none";
  }
  function showShareCodeView(code) {
    document.getElementById("shareChoiceView").style.display = "none";
    document.getElementById("shareCodeView").style.display = "block";
    document.getElementById("shareJoinView").style.display = "none";
    document.getElementById("shareCodeBig").textContent = code;
  }
  function showShareJoinView() {
    document.getElementById("shareChoiceView").style.display = "none";
    document.getElementById("shareCodeView").style.display = "none";
    document.getElementById("shareJoinView").style.display = "block";
    document.getElementById("joinError").textContent = "";
    document.getElementById("joinCodeInput").value = "";
  }

  // --- יוצרים מרוץ חדש ומקבלים קוד לשתף עם חבר ---
  function createRace() {
    if (!firebaseReady) { showShareCodeView("---"); return; }
    const code = generateRaceCode();
    const data = {
      hostName: playerName || "שחקן",
      hostScore: totalScore || 0,
      guestName: null,
      guestScore: null,
      createdAt: Date.now(),
    };
    db.collection("races").doc(code).set(data).then(() => {
      raceCode = code;
      raceRole = "host";
      showShareCodeView(code);
      listenToRace(code);
    }).catch(() => {
      showShareCodeView("שגיאה, נסו שוב");
    });
  }

  // --- מצטרפים למרוץ קיים לפי קוד שקיבלנו מחבר ---
  function joinRace() {
    const input = document.getElementById("joinCodeInput");
    const code = input.value.trim().toUpperCase();
    const errorEl = document.getElementById("joinError");
    errorEl.textContent = "";

    if (!code) { errorEl.textContent = "הקלידו קוד קודם ✏️"; return; }
    if (!firebaseReady) { errorEl.textContent = "אין כרגע חיבור לאינטרנט"; return; }

    const docRef = db.collection("races").doc(code);
    docRef.get().then((doc) => {
      if (!doc.exists) { errorEl.textContent = "לא מצאנו קוד כזה 🤔"; return; }
      const data = doc.data();
      if (data.guestName) { errorEl.textContent = "כבר יש חבר במרוץ הזה"; return; }

      docRef.set({
        hostName: data.hostName,
        hostScore: data.hostScore,
        guestName: playerName || "שחקן",
        guestScore: totalScore || 0,
        createdAt: data.createdAt,
      }).then(() => {
        raceCode = code;
        raceRole = "guest";
        closeShareModal();
        listenToRace(code);
      }).catch(() => { errorEl.textContent = "לא הצלחנו להצטרף, נסו שוב"; });
    }).catch(() => { errorEl.textContent = "שגיאה בחיפוש הקוד"; });
  }

  // --- מאזינים למרוץ בזמן אמת, ומעדכנים את הניקוד של החבר על המסך ---
  function listenToRace(code) {
    if (raceUnsubscribe) raceUnsubscribe();   // מפסיקים להאזין למרוץ קודם, אם היה כזה
    raceUnsubscribe = db.collection("races").doc(code).onSnapshot((doc) => {
      if (!doc.exists) return;
      const data = doc.data();
      const isHost = raceRole === "host";
      const friendNm = isHost ? data.guestName : data.hostName;
      const friendSc = isHost ? data.guestScore : data.hostScore;
      const statusEl = document.getElementById("raceStatus");
      statusEl.textContent = friendNm
        ? "🏁 " + friendNm + ": " + friendSc + " נקודות"
        : "🏁 ממתינים שחבר יצטרף... קוד: " + code;
    }, () => {});   // מתעלמים משגיאות חיבור זמניות
  }

  // --- שולחים את הניקוד שלנו למרוץ בכל פעם שהוא מתעדכן (אם מחוברים) ---
  function pushMyScoreToRace() {
    if (!raceCode || !firebaseReady) return;
    const field = raceRole === "host" ? "hostScore" : "guestScore";
    db.collection("races").doc(raceCode).update({ [field]: totalScore }).catch(() => {});
  }

  // טוענים את השיא מהזיכרון של הדפדפן (אם אין עדיין — מתחילים מ-0).
  // localStorage שומר את המספר גם אחרי שסוגרים את הדף או מכבים את המחשב.
  let highScore = Number(localStorage.getItem("starsHighScore")) || 0;

  // =========================================================
  //  רקעי חלל 🌌 — תמונות אמיתיות של נאס"א (NASA), מוצגות מעל שמיים+כוכבים מצוירים
  //  אינדקסים 0-1 = קל/בינוני, אינדקסים 2-5 = מתחלפים ברמת קשה
  // =========================================================
  const SPACE_THEMES = [
    { // 0: ערפילית הטרנטולה — רמת קל (תמונה שממלאת את כל הרקע)
      mode: "field", file: "space/0_nebula.jpg", img: new Image(),
    },
    { // 1: צדק (יופיטר) עם הכתם האדום הגדול — רמת בינוני
      mode: "circle", skyTop: "#1b1710", skyBottom: "#050402",
      x: 430, y: 150, r: 95, file: "space/1_jupiter.jpg", img: new Image(),
    },
    { // 2: אורנוס — רמת קשה (מתחלף 1)
      mode: "circle", skyTop: "#03181c", skyBottom: "#01080a",
      x: 150, y: 150, r: 90, file: "space/2_uranus.jpg", img: new Image(),
    },
    { // 3: כדור הארץ — רמת קשה (מתחלף 2)
      mode: "circle", skyTop: "#040a1c", skyBottom: "#01030a",
      x: 440, y: 170, r: 100, file: "space/3_earth.jpg", img: new Image(),
    },
    { // 4: שבתאי עם הטבעות — רמת קשה (מתחלף 3). מלבני כדי לא לקטוע את הטבעות
      mode: "rect", skyTop: "#171006", skyBottom: "#060402",
      x: 300, y: 190, r: 110, file: "space/4_saturn.jpg", img: new Image(),
    },
    { // 5: מאדים האדום — רמת קשה (מתחלף 4)
      mode: "circle", skyTop: "#1a0805", skyBottom: "#070301",
      x: 160, y: 160, r: 95, file: "space/5_mars.jpg", img: new Image(),
    },
  ];
  SPACE_THEMES.forEach((t) => { t.img.src = t.file; });   // מתחילים לטעון את כל התמונות כבר עכשיו

  // --- "מכסה" תמונה על תוך מלבן יעד, בלי לעוות אותה (כמו CSS background-size: cover) ---
  function drawImageCover(bctx, img, dx, dy, dw, dh) {
    const destRatio = dw / dh;
    const srcRatio = img.width / img.height;
    let sx, sy, sw, sh;
    if (srcRatio > destRatio) {
      sh = img.height;
      sw = sh * destRatio;
      sx = (img.width - sw) / 2;
      sy = 0;
    } else {
      sw = img.width;
      sh = sw / destRatio;
      sx = 0;
      sy = (img.height - sh) / 2;
    }
    bctx.drawImage(img, sx, sy, sw, sh, dx, dy, dw, dh);
  }

  // --- מצייר ערכת נושא חלל אחת על "קנבס נסתר" (נעשה פעם אחת בלבד ונשמר) ---
  function generateSpaceBackground(theme) {
    const bg = document.createElement("canvas");
    bg.width = canvas.width;
    bg.height = canvas.height;
    const bctx = bg.getContext("2d");

    // עבור תמונות "כוכב לכת" מציירים קודם שמיים כהים + כוכבים מפוזרים ברקע.
    // תמונת הערפילית (mode: field) כבר מלאה בכוכבים בעצמה — לא צריך תוספת.
    if (theme.mode !== "field") {
      const sky = bctx.createLinearGradient(0, 0, 0, bg.height);
      sky.addColorStop(0, theme.skyTop);
      sky.addColorStop(1, theme.skyBottom);
      bctx.fillStyle = sky;
      bctx.fillRect(0, 0, bg.width, bg.height);

      for (let i = 0; i < 90; i++) {
        const sx = Math.random() * bg.width;
        const sy = Math.random() * bg.height;
        bctx.globalAlpha = Math.random() * 0.6 + 0.3;
        bctx.fillStyle = "#ffffff";
        bctx.beginPath();
        bctx.arc(sx, sy, Math.random() * 1.4 + 0.3, 0, Math.PI * 2);
        bctx.fill();
      }
      bctx.globalAlpha = 1;
    }

    // מציירים את התמונה האמיתית עצמה (ברגע שהיא נטענת — אם עדיין לא נטענה, נצייר כשתסתיים)
    function paintPhoto() {
      if (theme.mode === "field") {
        drawImageCover(bctx, theme.img, 0, 0, bg.width, bg.height);
      } else if (theme.mode === "rect") {
        // מלבן רחב יותר מגובה — כדי שהטבעות של שבתאי לא ייחתכו
        const w = theme.r * 2.6, h = theme.r * 2.1;
        drawImageCover(bctx, theme.img, theme.x - w / 2, theme.y - h / 2, w, h);
      } else {
        // כוכב לכת עגול: חותכים לעיגול ומוסיפים צל עדין לתחושת עומק
        bctx.save();
        bctx.beginPath();
        bctx.arc(theme.x, theme.y, theme.r, 0, Math.PI * 2);
        bctx.clip();
        const size = theme.r * 2;
        drawImageCover(bctx, theme.img, theme.x - size / 2, theme.y - size / 2, size, size);
        bctx.restore();

        const shade = bctx.createRadialGradient(
          theme.x - theme.r * 0.3, theme.y - theme.r * 0.3, theme.r * 0.2,
          theme.x, theme.y, theme.r
        );
        shade.addColorStop(0, "rgba(0,0,0,0)");
        shade.addColorStop(1, "rgba(0,0,0,0.35)");
        bctx.beginPath();
        bctx.arc(theme.x, theme.y, theme.r, 0, Math.PI * 2);
        bctx.fillStyle = shade;
        bctx.fill();
      }
    }

    if (theme.img.complete) paintPhoto();      // התמונה כבר בזיכרון (למשל טעונה מראש)
    else theme.img.onload = paintPhoto;        // אחרת מציירים אותה ברגע שהיא תיטען

    return bg;
  }

  const bgCache = {};   // כדי לא לצייר את אותה ערכת נושא כמה פעמים
  function getSpaceBackground(themeIndex) {
    if (!bgCache[themeIndex]) bgCache[themeIndex] = generateSpaceBackground(SPACE_THEMES[themeIndex]);
    return bgCache[themeIndex];
  }

  let currentBg = null;    // הרקע המצויר כרגע
  let hardBgIndex = 2;     // איזו ערכת נושא פעילה ברמת קשה (מתחיל מ-2, מסתובב עד 5)

  // =========================================================
  //  מנוע הצלילים 🔊
  //  הצלילים נוצרים מתוך הדפדפן עצמו — בלי קבצים חיצוניים.
  //  כל צליל הוא רצף של "צפצופים" (תווים) שמתנגנים אחד אחרי השני.
  // =========================================================
  let audioCtx;  // נפתח בלחיצה הראשונה (הדפדפן דורש זאת)

  // מנגן תו בודד: תדר (גובה הצליל), מתי להתחיל, וכמה זמן
  function playTone(frequency, startTime, duration) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = "triangle";              // סוג הצליל (נסו: "sine" / "square" / "sawtooth")
    osc.frequency.value = frequency;
    gain.gain.setValueAtTime(0.25, startTime);
    gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration); // דעיכה רכה
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(startTime);
    osc.stop(startTime + duration);
  }

  // מנגן רצף תווים (מנגינה קטנה)
  function playMelody(notes) {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let t = audioCtx.currentTime;
    for (const note of notes) {
      playTone(note.freq, t, note.dur);
      t += note.dur;
    }
  }

  // צליל ניצחון 🎉 — מנגינה עולה ושמחה (כשתופסים כוכב)
  function playWinSound() {
    playMelody([
      { freq: 660, dur: 0.10 },   // מי
      { freq: 880, dur: 0.14 },   // לה (גבוה יותר)
    ]);
  }

  // צליל כישלון 😢 — מנגינה יורדת ועצובה (כשהמשחק נגמר)
  function playLoseSound() {
    playMelody([
      { freq: 392, dur: 0.18 },   // סול
      { freq: 311, dur: 0.18 },   // מי במול
      { freq: 196, dur: 0.30 },   // סול נמוך
    ]);
  }

  // צליל זיקוקים 🎆 — פרץ מהיר של "פצפוצים" גבוהים ואקראיים (מוקש+כוכב מתנגשים)
  function playFireworkSound() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let t = audioCtx.currentTime;
    for (let i = 0; i < 6; i++) {
      const freq = 700 + Math.random() * 1300;   // תדר אקראי גבוה = "פצפוץ"
      playTone(freq, t, 0.06);
      t += 0.02;                                  // כל פצפוץ מתחיל רגע אחרי הקודם
    }
  }

  // צליל פאנפרה 🎺 — מנגינה עולה וחגיגית (מעבר שלב / ניצחון)
  function playFanfareSound() {
    playMelody([
      { freq: 523, dur: 0.12 },   // דו
      { freq: 659, dur: 0.12 },   // מי
      { freq: 784, dur: 0.12 },   // סול
      { freq: 1047, dur: 0.28 },  // דו גבוה
    ]);
  }

  // --- מציג מסך עם הודעה וכפתורים ---
  // משמש לכל המסכים: פתיחה, מעבר שלב, ניצחון וסיום.
  // buttons = רשימה של { label, action } — לכל כפתור טקסט ופעולה ללחיצה.
  function showScreen(message, buttons) {
    screenMessage.innerHTML = message;
    screenButtons.innerHTML = "";
    for (const b of buttons) {
      const btn = document.createElement("button");
      btn.className = "diffBtn";
      btn.textContent = b.label;
      btn.onclick = b.action;
      screenButtons.appendChild(btn);
    }
    startScreen.style.display = "block";
  }

  // --- ממיר טקסט חופשי (שם שחקן) ל-HTML בטוח, כדי שלא יהיה אפשר "להזריק" קוד ---
  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  // --- בונה HTML של טבלת שלושת המובילים מתוך רשימת {name, score} ---
  function buildLeaderboardHtml(board) {
    if (!board || board.length === 0) return "";
    const medals = ["🥇", "🥈", "🥉"];
    let html = '<div id="leaderboardBox"><div class="lbTitle">🏆 שלושת הראשונים</div>';
    board.forEach((entry, i) => {
      html += '<div class="lbRow">' + medals[i] + " " + escapeHtml(entry.name) + " — " + entry.score + " כוכבים</div>";
    });
    html += "</div>";
    return html;
  }

  // --- טבלה מקומית (מהמכשיר הזה) — מוצגת מיד, לפני שהנתונים המקוונים מגיעים ---
  function renderLeaderboard() {
    const board = JSON.parse(localStorage.getItem("starsLeaderboard") || "[]");
    return buildLeaderboardHtml(board);
  }

  // --- מחליף את הטבלה המקומית בטבלה המקוונת (משותפת לכל השחקנים), ברגע שהיא מגיעה ---
  function refreshOnlineLeaderboard() {
    fetchTopScoresOnline().then((board) => {
      if (!board) return;   // אין רשת/הגדרה — משאירים את הטבלה המקומית כפי שהיא
      const slot = document.getElementById("leaderboardSlot");
      if (slot) slot.innerHTML = buildLeaderboardHtml(board);
    });
  }

  // --- שומר ניקוד סופי: גיבוי מקומי (עובד תמיד) + שליחה לטבלה המקוונת (אם מחוברים) ---
  function saveScoreToLeaderboard(name, finalScore) {
    const board = JSON.parse(localStorage.getItem("starsLeaderboard") || "[]");
    board.push({ name: name, score: finalScore });
    board.sort((a, b) => b.score - a.score);   // מהניקוד הגבוה לנמוך
    board.length = Math.min(board.length, 3);  // רק 3 המקומות הראשונים
    localStorage.setItem("starsLeaderboard", JSON.stringify(board));

    saveScoreOnline(name, finalScore);   // שולחים גם לטבלה המשותפת לכל השחקנים
  }

  // --- מסך הפתיחה: שם שחקן + טבלת שיאים + כפתור התחלה ---
  function showStartScreen() {
    // "שחקן אלמוני" הוא שם ברירת מחדל ישן מגרסה קודמת (לפני ששם היה חובה) —
    // אם זה מה שנשמר, מתייחסים אליו כאילו לא נשמר שם, כדי שהשדה יתחיל ריק
    let savedName = localStorage.getItem("starsPlayerName") || "";
    if (savedName === "שחקן אלמוני") savedName = "";
    const savedColor = localStorage.getItem("starsBasketColor") || basketColor;
    screenMessage.innerHTML =
      "⭐ כוכבים נופלים ⭐<br>אספו 20 כוכבים כדי לעבור שלב!<br>היזהרו מהמוקשים 💣" +
      '<div class="nameRow">השם שלי: <input id="playerNameInput" type="text" maxlength="12" placeholder="הקלידו שם"></div>' +
      '<div class="nameError" id="nameError"></div>' +
      '<div class="colorRow">צבע הסלסלה שלי: <input id="basketColorInput" type="color"></div>' +
      '<div id="leaderboardSlot">' + renderLeaderboard() + '</div>';
    document.getElementById("playerNameInput").value = savedName;
    document.getElementById("basketColorInput").value = savedColor;
    refreshOnlineLeaderboard();   // מחליפים בטבלה המקוונת (משותפת לכולם) ברגע שהיא מגיעה

    screenButtons.innerHTML = "";
    const btn = document.createElement("button");
    btn.className = "diffBtn";
    btn.textContent = "התחל משחק 🎮";
    btn.onclick = startNewRun;
    screenButtons.appendChild(btn);

    startScreen.style.display = "block";
  }

  // --- מתחילים ריצה חדשה מההתחלה (תמיד רמת "קל") --- שם שחקן הוא שדה חובה
  function startNewRun() {
    const input = document.getElementById("playerNameInput");
    const name = input ? input.value.trim() : "";
    const errorEl = document.getElementById("nameError");

    if (!name) {   // בלי שם — לא מתחילים, ומראים הודעה
      if (errorEl) errorEl.textContent = "נא להקליד שם לפני שמתחילים ✏️";
      if (input) { input.classList.add("invalid"); input.focus(); }
      return;
    }

    if (input) input.classList.remove("invalid");
    if (errorEl) errorEl.textContent = "";

    playerName = name;
    localStorage.setItem("starsPlayerName", playerName);   // זוכרים את השם לפעם הבאה

    const colorInput = document.getElementById("basketColorInput");
    if (colorInput) {
      basketColor = colorInput.value;
      localStorage.setItem("starsBasketColor", basketColor);   // זוכרים את הצבע לפעם הבאה
    }

    totalScore = 0;                                        // מאפסים את סך הניקוד לריצה חדשה
    startLevel("easy");
  }

  // --- "נסה שוב" ממסך סיום/ניצחון — אין שם להקליד שם, ממשיכים עם השם שכבר אושר ---
  function restartRun() {
    totalScore = 0;
    startLevel("easy");
  }

  // --- טוענים רמה מסוימת ומתחילים לשחק בה ---
  function startLevel(level) {
    currentLevel = level;
    const d = DIFFICULTIES[level];   // המספרים של הרמה הזו
    STARTING_LIVES  = d.lives;
    BASKET_WIDTH    = d.basketWidth;
    STAR_FALL_SPEED = d.starSpeed;
    STAR_SPAWN_RATE = d.starRate;
    MINE_FALL_SPEED = d.mineSpeed;
    MINE_SPAWN_RATE = d.mineRate;

    basketX = canvas.width / 2 - BASKET_WIDTH / 2;
    basketY = BASKET_MAX_Y;   // מתחילים למטה, כרגיל
    score = 0;                 // הניקוד מתחיל מ-0 בכל רמה
    lives = STARTING_LIVES;
    stars = [];
    mines = [];
    particles = [];
    balloons = [];
    balloonTintColor = null;
    balloonTintFramesLeft = 0;
    frameCount = 0;
    isPlaying = true;
    startScreen.style.display = "none";

    // בוחרים את רקע החלל של השלב: קל=0, בינוני=1, קשה=מתחיל מ-2 ומתחלף כל 15 כוכבים
    if (level === "easy")   currentBg = getSpaceBackground(0);
    if (level === "medium") currentBg = getSpaceBackground(1);
    if (level === "hard")   { hardBgIndex = 2; currentBg = getSpaceBackground(hardBgIndex); }

    updateScoreboard();
    loop();
  }

  // --- הגענו ליעד הנקודות! עוברים לרמה הבאה, או מנצחים ---
  function advanceLevel() {
    playFanfareSound();              // 🎺 צליל חגיגי — אבל בלי לעצור את המשחק!
    const next = DIFFICULTIES[currentLevel].next;
    if (next) {
      // ממשיכים ישר לרמה הבאה בלי לעצור את המשחק (רעיון עומר) —
      // בלון מיוחד מכריז על המעבר במקום מסך שחוסם
      startLevel(next);
      spawnLevelUpBalloon(DIFFICULTIES[next].name);
    } else {
      // אין רמה הבאה — ניצחון מוחלט! זה עדיין רגע לעצור בשבילו (בניגוד למעבר בין שלבים)
      isPlaying = false;
      saveScoreToLeaderboard(playerName, totalScore);
      showScreen(
        "🏆 ניצחת! 🏆<br>עברת את כל הרמות — אלוף הכוכבים! ⭐" +
        "<br>" + playerName + ", סה\"כ אספת " + totalScore + " כוכבים" +
        '<div id="leaderboardSlot">' + renderLeaderboard() + '</div>',
        [ { label: "שחק מחדש 🔄", action: restartRun } ]
      );
      refreshOnlineLeaderboard();
    }
  }

  // --- מצייר כוכב תלת-ממדי מבריק במקום מסוים ---
  function drawStar(x, y, size, rotation, kind) {
    ctx.save();
    ctx.translate(x, y);       // מזיזים את "העט" למרכז הכוכב
    ctx.rotate(rotation);      // מסובבים אותו — נותן תחושת תלת-ממד

    // בונים את צורת הכוכב (5 קצוות חיצוניים ו-5 פנימיים)
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const angle = (Math.PI / 2.5) * i - Math.PI / 2;
      ctx.lineTo(Math.cos(angle) * size, Math.sin(angle) * size);
      const inner = (Math.PI / 2.5) * i - Math.PI / 2 + Math.PI / 5;
      ctx.lineTo(Math.cos(inner) * (size / 2), Math.sin(inner) * (size / 2));
    }
    ctx.closePath();

    // בוחרים צבעים, זוהר, ומספר לפי סוג הכוכב
    let glow = null, c0, c1, c2, outline, label = null, labelOutline;
    if (kind === "gold") {          // כוכב זהב נדיר מאוד ⭐ — שווה 10 (רעיון עומר)
      glow = "#ffd24d"; c0 = "#fffbe6"; c1 = "#ffd400"; c2 = "#b8860b"; outline = "#8a6d00";
      label = "10"; labelOutline = "#6b5200";
    } else if (kind === "super") {  // כוכב-על ורוד ✨ — שווה 5
      glow = "#ff5ec4"; c0 = "#ffe3fb"; c1 = "#ff6fd8"; c2 = "#9a2fb0"; outline = "#6b1a80";
      label = "5"; labelOutline = "#4a0e5c";
    } else {                        // כוכב רגיל — שווה 1
      c0 = "#fff3c4"; c1 = "#fbbc46"; c2 = "#c8860a"; outline = "#a86c00";
    }

    // כוכבים מיוחדים מקבלים זוהר צבעוני; כוכב רגיל מקבל צל רך שנותן תחושת ריחוף
    if (glow) {
      ctx.shadowColor = glow;
      ctx.shadowBlur = 20;
    } else {
      ctx.shadowColor = "rgba(0,0,0,0.5)";
      ctx.shadowBlur = 8;
      ctx.shadowOffsetX = 3;
      ctx.shadowOffsetY = 4;
    }

    // מילוי במעבר צבעים (gradient) — נותן לכוכב מראה תלת-ממדי ומבריק כמו מתכת
    const grad = ctx.createRadialGradient(-size / 3, -size / 3, size / 8, 0, 0, size);
    grad.addColorStop(0,   c0);   // נקודת אור בהירה (ה"ברק")
    grad.addColorStop(0.5, c1);
    grad.addColorStop(1,   c2);   // צל כהה בקצה
    ctx.fillStyle = grad;
    ctx.fill();

    // קו מתאר כהה — מדגיש את הקצוות ומחזק את העומק
    ctx.shadowColor = "transparent";     // מבטלים צל בשביל הקו עצמו
    ctx.lineWidth = 1.5;
    ctx.strokeStyle = outline;
    ctx.stroke();

    // מספר על הכוכב (5 לכוכב-על, 10 לכוכב זהב) — מבטלים את הסיבוב כדי שיישאר זקוף וקריא
    if (label) {
      ctx.rotate(-rotation);
      let fs = Math.round(size);
      ctx.font = "bold " + fs + "px Arial";
      while (ctx.measureText(label).width > size * 1.3 && fs > 10) {
        fs -= 2;
        ctx.font = "bold " + fs + "px Arial";
      }
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.lineWidth = 3;
      ctx.strokeStyle = labelOutline;
      ctx.strokeText(label, 0, 1);
      ctx.fillStyle = "#ffffff";
      ctx.fillText(label, 0, 1);
    }

    ctx.restore();             // מחזירים את ה"עט" למצב הרגיל
  }

  // --- מצייר מוקש 💣 (כדור כהה עם קוצים) ---
  function drawMine(x, y, size) {
    ctx.save();
    ctx.translate(x, y);

    // הקוצים מסביב למוקש
    ctx.strokeStyle = "#e02d2d";
    ctx.lineWidth = 3;
    for (let i = 0; i < 8; i++) {
      const angle = (Math.PI / 4) * i;
      ctx.beginPath();
      ctx.moveTo(Math.cos(angle) * size, Math.sin(angle) * size);
      ctx.lineTo(Math.cos(angle) * (size + 6), Math.sin(angle) * (size + 6));
      ctx.stroke();
    }

    // גוף המוקש — כדור כהה עם מעט נפח (gradient)
    const grad = ctx.createRadialGradient(-size / 3, -size / 3, size / 6, 0, 0, size);
    grad.addColorStop(0, "#777");
    grad.addColorStop(1, "#1a1a1a");
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, size, 0, Math.PI * 2);
    ctx.fill();

    // נקודה אדומה מהבהבת במרכז — "סכנה!"
    ctx.fillStyle = "#ff3b3b";
    ctx.beginPath();
    ctx.arc(0, 0, size / 4, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  // --- יוצר פיצוץ זיקוקים 🎆 במקום מסוים (כשכוכב ומוקש מתנגשים) ---
  function spawnFirework(x, y) {
    const colors = ["#ff5e5e", "#fbbc46", "#42bbc8", "#a86cff", "#5eff8f", "#ffffff"];
    for (let i = 0; i < 24; i++) {
      // כל ניצוץ יורה בזווית קצת אחרת סביב מעגל שלם — ככה נוצרת צורת "פיצוץ"
      const angle = (Math.PI * 2 * i) / 24 + Math.random() * 0.3;
      const speed = 2 + Math.random() * 3;
      particles.push({
        x: x, y: y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        color: colors[Math.floor(Math.random() * colors.length)],
        life: 1,        // 1 = ניצוץ מלא. יורד בהדרגה עד 0 ואז נעלם.
      });
    }
  }

  // --- מזיז ומצייר את כל ניצוצות הזיקוקים הפעילים ---
  function updateAndDrawParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.08;      // כוח משיכה קל — הניצוצות שוקעות למטה
      p.life -= 0.03;    // דהייה הדרגתית
      if (p.life <= 0) { particles.splice(i, 1); continue; }

      ctx.globalAlpha = p.life;   // ככל שהחיים נגמרים — הניצוץ נעשה שקוף יותר
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }

  // --- מצייר בלון ניקוד 🎈 (רעיון עומר) — עם מספר הנקודות באמצע ---
  function drawBalloon(x, y, size, color, points) {
    ctx.save();
    ctx.translate(x, y);

    // גוף הבלון — מעבר צבעים כדי שייראה עגול ומבריק
    const grad = ctx.createRadialGradient(-size * 0.3, -size * 0.35, size * 0.15, 0, 0, size);
    grad.addColorStop(0, "#ffffff");
    grad.addColorStop(0.35, color);
    grad.addColorStop(1, color);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(0, 0, size * 0.8, size, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = "rgba(0,0,0,0.25)";
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // קשר קטן וחוט למטה
    ctx.beginPath();
    ctx.moveTo(-4, size);
    ctx.lineTo(4, size);
    ctx.lineTo(0, size + 8);
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(0, size + 8);
    ctx.lineTo(0, size + 24);
    ctx.strokeStyle = "#8a7256";
    ctx.lineWidth = 1;
    ctx.stroke();

    // הטקסט באמצע הבלון (מספר ניקוד, או שם שלב כשזה בלון הכרזת-שלב) —
    // מקטינים את הגופן אוטומטית אם הטקסט ארוך מדי כדי שתמיד יכנס בבלון
    const text = String(points);
    let fontSize = Math.round(size * 0.7);
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.font = "bold " + fontSize + "px Arial";
    const maxTextWidth = size * 1.5;
    while (ctx.measureText(text).width > maxTextWidth && fontSize > 10) {
      fontSize -= 2;
      ctx.font = "bold " + fontSize + "px Arial";
    }
    ctx.lineWidth = 3;
    ctx.strokeStyle = "rgba(0,0,0,0.4)";
    ctx.strokeText(text, 0, 0);
    ctx.fillStyle = "#ffffff";
    ctx.fillText(text, 0, 0);

    ctx.restore();
  }

  // --- יוצר בלון-הכרזה מיוחד שמודיע שעברנו שלב (רעיון עומר) —
  // במקום לעצור את המשחק עם מסך, מכריזים על זה דרך בלון כמו כל בלון ניקוד רגיל ---
  function spawnLevelUpBalloon(levelName) {
    const color = BALLOON_COLORS[Math.floor(Math.random() * BALLOON_COLORS.length)];
    // מיקום אקראי (לא מעל הסלסלה!) כדי שהבלון יעלה ויוצג יפה, ולא ייתפס מיד בתחתית
    const bx = Math.random() * (canvas.width - LEVELUP_BALLOON_SIZE * 2) + LEVELUP_BALLOON_SIZE;
    balloons.push({
      x: bx,
      y: canvas.height + LEVELUP_BALLOON_SIZE,
      color: color,
      points: levelName,             // מציגים את שם השלב במקום מספר ניקוד
      size: LEVELUP_BALLOON_SIZE,
      announce: true,                // בלון הכרזה — רק עולה ומוצג, לא נתפס ולא מתפוצץ
    });
  }

  // --- מצייר את הסלסלה ---
  function drawBasket() {
    const y = basketY;   // המיקום האנכי האמיתי של הסלסלה (יכול לזוז למעלה/למטה)
    ctx.fillStyle = basketColor;   // הצבע שהשחקן בחר (רעיון עומר)
    ctx.beginPath();
    ctx.moveTo(basketX, y);
    ctx.lineTo(basketX + BASKET_WIDTH, y);
    ctx.lineTo(basketX + BASKET_WIDTH - 12, y + 28);
    ctx.lineTo(basketX + 12, y + 28);
    ctx.closePath();
    ctx.fill();
    // קווי הקש של הסלסלה
    ctx.strokeStyle = "#282355";
    ctx.lineWidth = 2;
    ctx.stroke();

    // מציגים את הניקוד הנוכחי ישר על הסלסלה (רעיון עומר) — תמיד רואים כמה נקודות יש
    ctx.save();
    const scoreText = String(totalScore);
    let fs = 15;
    ctx.font = "bold " + fs + "px Arial";
    // אם המספר גדול ולא נכנס ברוחב הסלסלה — מקטינים אותו קצת
    while (ctx.measureText(scoreText).width > BASKET_WIDTH - 16 && fs > 9) {
      fs--;
      ctx.font = "bold " + fs + "px Arial";
    }
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.lineWidth = 3;
    ctx.strokeStyle = "rgba(0,0,0,0.6)";      // מתאר כהה — קריא על כל צבע סלסלה
    ctx.strokeText(scoreText, basketX + BASKET_WIDTH / 2, y + 14);
    ctx.fillStyle = "#ffffff";
    ctx.fillText(scoreText, basketX + BASKET_WIDTH / 2, y + 14);
    ctx.restore();
  }

  // --- מעדכן את לוח הניקוד למעלה ---
  function updateScoreboard() {
    scoreEl.textContent = score;
    // אם אין יעד (רמה אינסופית) — מציגים סימן אינסוף ∞ במקום מספר
    targetEl.textContent = isFinite(DIFFICULTIES[currentLevel].target)
      ? DIFFICULTIES[currentLevel].target
      : "∞";
    levelEl.textContent = DIFFICULTIES[currentLevel].name;      // שם הרמה
    livesEl.textContent = "❤️".repeat(lives) || "💔";
    totalScoreEl.textContent = totalScore;                      // סך הכוכבים בריצה הנוכחית
    pushMyScoreToRace();   // אם יש מרוץ חי עם חבר — מעדכנים גם את הניקוד שלנו שם 🏁

    // אם הניקוד הנוכחי עבר את השיא — מעדכנים ושומרים בזיכרון
    if (score > highScore) {
      highScore = score;
      localStorage.setItem("starsHighScore", highScore);
    }
    highScoreEl.textContent = highScore;
  }

  // --- מרעיד את המסך לרגע קצר (רעיון עומר) — כשמוקש פוגע בסלסלה 💥 ---
  function shakeScreen() {
    canvas.classList.remove("shake");
    void canvas.offsetWidth;   // "טריק" שמאלץ את הדפדפן לאתחל את האנימציה, כדי שתעבוד גם בפגיעות רצופות
    canvas.classList.add("shake");
  }

  // --- הלולאה הראשית: רצה ~60 פעמים בשנייה ---
  function loop() {
    if (!isPlaying) return;
    frameCount++;

    // מנקים את המסך ומציירים את רקע החלל (כוכבי הלכת) של השלב הנוכחי
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (currentBg) ctx.drawImage(currentBg, 0, 0);

    // אם תפסנו בלון לאחרונה — צובעים את הרקע זמנית בצבע שלו (רעיון עומר) 🎈
    if (balloonTintFramesLeft > 0) {
      ctx.fillStyle = balloonTintColor;
      ctx.globalAlpha = 0.35;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.globalAlpha = 1;
      balloonTintFramesLeft--;
    }

    // יוצרים כוכב חדש מדי פעם, במיקום אקראי — מגרילים את סוגו:
    // זהב (נדיר מאוד, 10 נק') · כוכב-על (נדיר, 5 נק') · או רגיל (1 נק')
    if (frameCount % STAR_SPAWN_RATE === 0) {
      const r = Math.random();
      let kind = "normal", size = STAR_SIZE, value = 1;
      if (r < GOLD_STAR_CHANCE) {
        kind = "gold"; size = GOLD_STAR_SIZE; value = GOLD_STAR_VALUE;
      } else if (r < GOLD_STAR_CHANCE + SUPER_STAR_CHANCE) {
        kind = "super"; size = SUPER_STAR_SIZE; value = SUPER_STAR_VALUE;
      }
      const x = Math.random() * (canvas.width - size * 2) + size;
      // rot = הזווית הנוכחית, spin = כמה מהר הכוכב מסתובב (אקראי לכל כוכב)
      stars.push({ x: x, y: -size, rot: 0, spin: (Math.random() - 0.5) * 0.1, size: size, kind: kind, value: value });
    }

    // יוצרים מוקש חדש מדי פעם, במיקום אקראי
    if (frameCount % MINE_SPAWN_RATE === 0) {
      const mx = Math.random() * (canvas.width - MINE_SIZE * 2) + MINE_SIZE;
      mines.push({ x: mx, y: -MINE_SIZE });
    }

    // (הבלון של כל 25 שניות הוסר — עכשיו הניקוד מוצג ישר על הסלסלה, ראו drawBasket)

    // מזיזים את הסלסלה לפי המקלדת (שמאל-ימין, ועכשיו גם למעלה-למטה!)
    if (moveLeft)  basketX -= BASKET_SPEED;
    if (moveRight) basketX += BASKET_SPEED;
    if (moveUp)    basketY -= BASKET_SPEED;
    if (moveDown)  basketY += BASKET_SPEED;
    // לא נותנים לסלסלה לצאת מהמסך, ולא לעוף גבוה/נמוך מדי
    basketX = Math.max(0, Math.min(canvas.width - BASKET_WIDTH, basketX));
    basketY = Math.max(BASKET_MIN_Y, Math.min(BASKET_MAX_Y, basketY));

    // מזיזים ומציירים כל כוכב
    for (let i = stars.length - 1; i >= 0; i--) {
      const star = stars[i];
      star.y += STAR_FALL_SPEED;
      star.rot += star.spin;     // מסובבים את הכוכב מעט → תחושת תלת-ממד
      drawStar(star.x, star.y, star.size, star.rot, star.kind);

      // האם הכוכב נתפס בסלסלה? (בודקים שהוא בתוך הרצועה שבה הסלסלה נמצאת עכשיו —
      // חשוב עכשיו שהסלסלה יכולה לזוז למעלה/למטה, לא רק קו קבוע בתחתית)
      const caught = star.y + star.size > basketY &&
                     star.y - star.size < basketY + BASKET_HEIGHT &&
                     star.x > basketX &&
                     star.x < basketX + BASKET_WIDTH;
      if (caught) {
        const gained = star.value;   // כל סוג כוכב שווה מספר נקודות משלו (רגיל 1 · על 5 · זהב 10)
        score += gained;
        totalScore += gained;   // סופרים גם לסך הכל של כל הריצה (לטבלת השיאים)
        stars.splice(i, 1);   // מוחקים את הכוכב שנתפס
        updateScoreboard();
        playWinSound();        // 🎉 צליל ניצחון!

        // ברמת קשה: כל 15 כוכבים מחליפים לכוכב לכת אחר ברקע 🌌
        if (currentLevel === "hard" && score % 15 === 0) {
          const hardThemeCount = SPACE_THEMES.length - 2;   // כמה ערכות נושא שמורות לרמת קשה (2..5)
          hardBgIndex = 2 + ((hardBgIndex - 2 + 1) % hardThemeCount);
          currentBg = getSpaceBackground(hardBgIndex);
        }

        if (score >= DIFFICULTIES[currentLevel].target) {  // הגענו ליעד?
          advanceLevel();
          return;
        }
        continue;
      }

      // האם הכוכב נפל לרצפה?
      if (star.y > canvas.height) {
        stars.splice(i, 1);
        lives--;
        updateScoreboard();
        if (lives <= 0) {
          gameOver();
          return;
        }
      }
    }

    // מזיזים ומציירים כל מוקש
    for (let i = mines.length - 1; i >= 0; i--) {
      const mine = mines[i];
      mine.y += MINE_FALL_SPEED;
      drawMine(mine.x, mine.y, MINE_SIZE);

      // האם הסלסלה תפסה מוקש? אם כן — מאבדים לב אחד! 💥 (אותה בדיקת רצועה כמו בכוכבים)
      const hit = mine.y + MINE_SIZE > basketY &&
                  mine.y - MINE_SIZE < basketY + BASKET_HEIGHT &&
                  mine.x > basketX &&
                  mine.x < basketX + BASKET_WIDTH;
      if (hit) {
        mines.splice(i, 1);     // המוקש התפוצץ — מוחקים אותו
        lives--;                // מאבדים לב אחד
        updateScoreboard();
        shakeScreen();          // 💥 המסך רועד מהפגיעה! (רעיון עומר)
        if (lives <= 0) {       // רק אם נגמרו כל הלבבות — סוף משחק
          gameOver();
          return;
        }
        playLoseSound();        // צליל "אאוץ'" על הפגיעה
        continue;
      }

      // מוקש שנפל לרצפה בלי שנתפס — התחמקנו ממנו, פשוט מוחקים אותו
      if (mine.y > canvas.height) {
        mines.splice(i, 1);
      }
    }

    // בודקים התנגשות בין מוקש לכוכב באוויר — המוקש מתפוצץ בזיקוקים! 🎆
    // כוכב רגיל נעלם יחד עם המוקש, אבל כוכב-על ⭐✨ שורד וממשיך ליפול (הוא נדיר ושווה יותר!)
    for (let i = mines.length - 1; i >= 0; i--) {
      const mine = mines[i];
      for (let j = stars.length - 1; j >= 0; j--) {
        const star = stars[j];
        const dx = mine.x - star.x;
        const dy = mine.y - star.y;
        const touching = Math.sqrt(dx * dx + dy * dy) < MINE_SIZE + star.size;
        if (touching) {
          spawnFirework(mine.x, mine.y);   // הזיקוק במיקום המוקש — הוא זה שמתפוצץ
          playFireworkSound();
          mines.splice(i, 1);
          if (star.kind === "normal") {
            stars.splice(j, 1);   // כוכב רגיל נעלם; כוכבים מיוחדים (על/זהב) שורדים
          }
          break;   // המוקש הזה כבר התפוצץ — עוברים לבדוק את המוקש הבא
        }
      }
    }

    // מזיזים, מציירים ובודקים תפיסה של בלוני ניקוד 🎈 (רעיון עומר)
    for (let i = balloons.length - 1; i >= 0; i--) {
      const balloon = balloons[i];
      balloon.y -= BALLOON_SPEED;   // הבלון עף למעלה (לא נופל כמו כוכבים ומוקשים)
      drawBalloon(balloon.x, balloon.y, balloon.size, balloon.color, balloon.points);

      // האם הסלסלה תפסה את הבלון? (אותה בדיקת "רצועה" כמו כוכבים ומוקשים)
      // בלון הכרזת-שלב (announce) לא נתפס — הוא רק עולה, מוצג, ונעלם בראש המסך
      const balloonCaught = !balloon.announce &&
                             balloon.y + balloon.size > basketY &&
                             balloon.y - balloon.size < basketY + BASKET_HEIGHT &&
                             balloon.x > basketX &&
                             balloon.x < basketX + BASKET_WIDTH;
      if (balloonCaught) {
        balloons.splice(i, 1);
        // הרבה זיקוקים חגיגיים! 🎆🎆🎆
        spawnFirework(balloon.x, balloon.y);
        spawnFirework(balloon.x - 20, balloon.y - 15);
        spawnFirework(balloon.x + 20, balloon.y - 15);
        playFireworkSound();
        // הרקע מתחלף לצבע הבלון לכמה שניות
        balloonTintColor = balloon.color;
        balloonTintFramesLeft = BALLOON_TINT_FRAMES;
        continue;
      }

      // הבלון עף מעבר לראש המסך בלי שנתפס — נעלם בשקט, בלי שום עונש
      if (balloon.y < -balloon.size) {
        balloons.splice(i, 1);
      }
    }

    updateAndDrawParticles();   // מציירים את כל הזיקוקים הפעילים כרגע

    drawBasket();
    requestAnimationFrame(loop);   // מבקשים לצייר את הפריים הבא
  }

  // --- סוף משחק ---
  function gameOver() {
    isPlaying = false;
    playLoseSound();           // 😢 צליל כישלון!
    saveScoreToLeaderboard(playerName, totalScore);   // שומרים את הניקוד הסופי בטבלת השיאים
    showScreen(
      "המשחק נגמר 🌟<br>הגעת לרמה " + DIFFICULTIES[currentLevel].name +
      "<br>" + playerName + ", סה\"כ אספת " + totalScore + " כוכבים" +
      '<div id="leaderboardSlot">' + renderLeaderboard() + '</div>',
      [ { label: "נסה שוב מההתחלה 🔄", action: restartRun } ]
    );
    refreshOnlineLeaderboard();
  }

  // ====== שליטה במקלדת ======
  document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowLeft")  moveLeft = true;
    if (e.key === "ArrowRight") moveRight = true;
    if (e.key === "ArrowUp")    moveUp = true;
    if (e.key === "ArrowDown")  moveDown = true;
  });
  document.addEventListener("keyup", (e) => {
    if (e.key === "ArrowLeft")  moveLeft = false;
    if (e.key === "ArrowRight") moveRight = false;
    if (e.key === "ArrowUp")    moveUp = false;
    if (e.key === "ArrowDown")  moveDown = false;
  });

  // ====== שליטה בעכבר ובמגע (לנייד) — עכשיו גם למעלה/למטה ======
  // lift = כמה "להרים" את הסלסלה מעל נקודת המגע. 0 לעכבר, TOUCH_LIFT לאצבע בנייד.
  function moveBasketTo(clientX, clientY, lift) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    basketX = (clientX - rect.left) * scaleX - BASKET_WIDTH / 2;
    basketY = (clientY - rect.top) * scaleY - BASKET_HEIGHT / 2 - (lift || 0);
  }
  canvas.addEventListener("mousemove", (e) => moveBasketTo(e.clientX, e.clientY, 0));
  // במגע: מרימים את הסלסלה מעל האצבע כדי שהיא לא תסתיר אותה (במיוחד ברמה קשה כשהסלסלה קטנה)
  function handleTouch(e) {
    moveBasketTo(e.touches[0].clientX, e.touches[0].clientY, TOUCH_LIFT);
    e.preventDefault();
  }
  canvas.addEventListener("touchstart", handleTouch, { passive: false });
  canvas.addEventListener("touchmove", handleTouch, { passive: false });

  // ====== חיבור כפתורי חלון "מרוץ עם חבר" 🏁 ======
  document.getElementById("shareBtn").onclick = openShareModal;
  document.getElementById("shareCreateBtn").onclick = createRace;
  document.getElementById("shareJoinBtn").onclick = showShareJoinView;
  document.getElementById("joinSubmitBtn").onclick = joinRace;
  document.getElementById("shareCloseBtn").onclick = closeShareModal;

  // כשהדף נטען — מציגים את מסך בחירת הרמה (המשחק מתחיל רק אחרי בחירה)
  showStartScreen();
  </script>
</body>
</html>
